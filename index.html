<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙岩学院校园导航系统 · 专注步行版</title>
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: '3d310fd9f722b816654e3e9e1e1896f7' // ← 请替换为你的安全密钥
        };
    </script>
    <!-- 仅加载步行、搜索、定位插件 -->
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=	705cdf45cca072274e50d2823999e650&plugin=AMap.PlaceSearch,AMap.Geolocation,AMap.Walking">
    </script>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --success: #52c41a;
            --danger: #ff4d4f;
            --bg-panel: rgba(255, 255, 255, 0.96);
            --border: #e0e6ed;
            --radius: 12px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body,
        #container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "HarmonyOS Sans", "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        /* 控制面板 */
        .control-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 100;
            background: var(--bg-panel);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px 18px;
            width: 340px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            transition: all 0.2s;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
            color: #0a3147;
            margin-bottom: 16px;
            text-align: center;
            border-bottom: 2px solid #e8f0fe;
            padding-bottom: 12px;
            letter-spacing: 0.8px;
        }

        .search-box {
            display: flex;
            margin-bottom: 12px;
        }

        #search-input {
            flex: 1;
            padding: 11px 14px;
            border: 1px solid #ccd6e0;
            border-radius: 8px 0 0 8px;
            outline: none;
            font-size: 14px;
            background: #fff;
            transition: 0.2s;
        }

        #search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.12);
        }

        #search-btn {
            padding: 11px 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        #search-btn:hover {
            background: var(--primary-hover);
        }

        /* 快捷标签：仅保留教学楼和菜鸟驿站 */
        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .quick-tag {
            padding: 6px 16px;
            background: #f0f7ff;
            border: 1px solid #d4e6ff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: #0050b3;
            transition: 0.2s;
            font-weight: 500;
        }

        .quick-tag:hover {
            background: #ddeeff;
            border-color: var(--primary);
            color: #003a8c;
        }

        /* 功能按钮 */
        .function-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .function-btn {
            flex: 1;
            padding: 11px 6px;
            background: #f4f6f9;
            border: 1px solid #d5dce6;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
        }

        .function-btn:hover {
            background: #e6f4ff;
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 导航输入 */
        .nav-input-group {
            margin-bottom: 12px;
        }

        .nav-input-group label {
            display: block;
            font-size: 12px;
            color: #4a5568;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .nav-input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            background: #fafbfc;
            font-size: 13px;
            outline: none;
            color: #1e293b;
        }

        .nav-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.15);
        }

        /* 出行方式：只保留步行 */
        .travel-mode {
            display: flex;
            margin: 14px 0 10px;
            gap: 0;
        }

        .mode-btn {
            flex: 1;
            padding: 9px;
            background: #f0f2f5;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            cursor: default;
            font-size: 14px;
            text-align: center;
            color: #1e293b;
            font-weight: 600;
            background: #e6f7ff;
            border-color: var(--primary);
            color: var(--primary);
            pointer-events: none;
        }

        /* 导航按钮 */
        #nav-btn {
            width: 100%;
            padding: 13px;
            background: var(--success);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 6px;
            transition: background 0.2s;
            letter-spacing: 0.6px;
        }

        #nav-btn:hover {
            background: #45a849;
        }

        #clear-btn {
            width: 100%;
            padding: 10px;
            background: #fff;
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.2s;
        }

        #clear-btn:hover {
            background: #fff1f0;
        }

        /* 搜索结果面板 */
        #search-results {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 100;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 300px;
            max-height: 420px;
            overflow-y: auto;
            display: none;
            padding: 8px 0;
        }

        .result-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f2f5;
            cursor: pointer;
            transition: background 0.15s;
        }

        .result-item:hover {
            background: #f9fbfd;
        }

        .result-name {
            font-weight: 700;
            color: #0f172a;
            font-size: 14px;
        }

        .result-address {
            font-size: 12px;
            color: #64748b;
            margin: 4px 0 8px;
        }

        .result-actions {
            display: flex;
            gap: 8px;
        }

        .set-start-btn,
        .set-end-btn {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #ccd6e0;
            background: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .set-start-btn:hover {
            border-color: #fa8c16;
            color: #fa8c16;
            background: #fff7e6;
        }

        .set-end-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #e6f7ff;
        }

        /* 定位信息提示 */
        .location-info {
            position: absolute;
            bottom: 28px;
            left: 24px;
            background: white;
            border-radius: 8px;
            padding: 10px 16px;
            box-shadow: var(--shadow);
            display: none;
            z-index: 100;
            font-size: 13px;
            max-width: 300px;
            color: #1e293b;
        }

        /* 移动端适配 */
        @media (max-width: 640px) {
            .control-panel {
                width: calc(100vw - 20px);
                left: 10px;
                top: 10px;
                padding: 14px;
            }

            #search-results {
                width: calc(100vw - 20px);
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <!-- 控制面板 -->
    <div class="control-panel">
        <div class="panel-title">🏫 龙岩学院 · 步行导航</div>

        <!-- 搜索区域 -->
        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索地点，如『同心楼』『菜鸟驿站』">
            <button id="search-btn">🔍</button>
        </div>

        <!-- 快捷标签：仅保留教学楼和菜鸟驿站 -->
        <div class="quick-tags">
            <span class="quick-tag" data-keyword="龙岩学院教学楼">🏫 教学楼</span>
            <span class="quick-tag" data-keyword="龙岩学院菜鸟驿站">📦 菜鸟驿站</span>
        </div>

        <!-- 功能按钮 -->
        <div class="function-buttons">
            <div class="function-btn" id="locate-btn">📍 定位到我的位置</div>
            <div class="function-btn" id="reset-btn">🔄 重置视图</div>
        </div>

        <!-- 起点终点输入 -->
        <div class="nav-input-group">
            <label>🚩 起点</label>
            <input type="text" id="start-input" class="nav-input" placeholder="点击地图选择起点" readonly>
        </div>
        <div class="nav-input-group">
            <label>🏁 终点</label>
            <input type="text" id="end-input" class="nav-input" placeholder="点击地图选择终点" readonly>
        </div>

        <!-- 出行方式：仅保留步行 -->
        <div class="travel-mode">
            <div class="mode-btn active">🚶 步行（当前模式）</div>
        </div>

        <button id="nav-btn">▶ 开始步行导航</button>
        <button id="clear-btn">🗑 清除全部</button>
    </div>

    <!-- 搜索结果面板 -->
    <div id="search-results">
        <div style="padding:12px 16px; font-weight:700; color:#0f172a; border-bottom:1px solid #e2e8f0;">搜索结果</div>
        <div id="results-list"></div>
    </div>

    <!-- 定位信息浮层 -->
    <div class="location-info" id="location-info"></div>

    <script>
        (function() {
            // ==================== 基础坐标配置 ====================
            const CENTER = [117.023951, 25.030047];
            const BOUNDARY = [
            [117.0178, 25.0296],
            [117.0184, 25.0312],
            [117.0195, 25.0332],
            [117.0230, 25.0327],
            [117.0258, 25.0329],
            [117.0272, 25.0346],
            [117.0291, 25.0338],
            [117.0293, 25.0306],
            [117.0281, 25.0305],
            [117.0280, 25.0284],
            [117.0255, 25.0257],
            [117.0221, 25.0266],
            [117.0178, 25.0296]
            ];

            // 计算边界盒
            let minLng = Infinity,
                maxLng = -Infinity,
                minLat = Infinity,
                maxLat = -Infinity;
            BOUNDARY.forEach(([lng, lat]) => {
                if (lng < minLng) minLng = lng;
                if (lng > maxLng) maxLng = lng;
                if (lat < minLat) minLat = lat;
                if (lat > maxLat) maxLat = lat;
            });
            const MARGIN = 0.015; // 稍微收紧拖动范围

            // ==================== 初始化地图 ====================
            const map = new AMap.Map('container', {
                zoom: 16,
                center: CENTER,
                resizeEnable: true,
                limitBounds: new AMap.Bounds(
                    new AMap.LngLat(minLng - MARGIN, minLat - MARGIN),
                    new AMap.LngLat(maxLng + MARGIN, maxLat + MARGIN)
                ),
                minZoom: 15,
                maxZoom: 19,
                mapStyle: 'amap://styles/light',
                dragEnable: true, // 允许拖动，但范围受限
            });

            // ===== 1. 校园外部黑色遮罩（更深，fillOpacity 0.7） =====
            const maskOuter = [
                [minLng - 0.5, minLat - 0.5],
                [minLng - 0.5, maxLat + 0.5],
                [maxLng + 0.5, maxLat + 0.5],
                [maxLng + 0.5, minLat - 0.5],
            ];
            const maskPolygon = new AMap.Polygon({
                path: [
                    maskOuter.map(([lng, lat]) => new AMap.LngLat(lng, lat)),
                    BOUNDARY.map(([lng, lat]) => new AMap.LngLat(lng, lat)),
                ],
                fillColor: '#000000',
                fillOpacity: 0.7, // 更黑的遮罩
                strokeColor: '#1890ff',
                strokeWeight: 3,
                strokeOpacity: 0.9,
                strokeStyle: 'dashed',
                zIndex: 50,
            });
            map.add(maskPolygon);

            // ===== 2. 自定义POI（新增10个点，总计16个） =====
            const customPOIs = [
                // 原有6个
                { name: '龙工图书馆', pos: [117.0249, 25.0298], icon: '📚' },
                { name: '龙工学院', pos: [117.02238,25.031638], icon: '🏛️' },
                { name: '四组食堂', pos: [117.026521,25.031855], icon: '🍽️' },
                { name: '至善四栋', pos: [117.028065,25.032431], icon: '🏠' },
                { name: '体育馆', pos: [117.0194, 25.0309], icon: '🏟️' },
                { name: '同心教学楼', pos: [117.0238, 25.0290], icon: '🏫' },
                // 新增10个
                { name: '菜鸟驿站', pos: [117.0232, 25.0273], icon: '📦' },
                { name: '学生服务中心', pos: [117.026911,25.0298], icon: '🏠' },
                { name: '教工餐厅', pos: [117.021486,25.02994], icon: '🍜' },
                { name: '研究生公寓', pos: [117.019682,25.029051], icon: '🏡' },
                { name: '一号楼宿舍', pos: [117.02697,25.027553], icon: '🏡' },
                { name: '敏学楼', pos: [117.0232, 25.0270], icon: '🏢' },
                { name: '厚德楼', pos: [117.0244, 25.0271], icon: '🏢' },
                { name: '文虎楼', pos: [117.024766,25.027841], icon: '🔬' },
                { name: '东区田径场', pos: [117.025771,25.030758], icon: '🏥' },
                { name: '西北门', pos: [117.019604,25.032683], icon: '🚪' },
            ];

            customPOIs.forEach(poi => {
                const marker = new AMap.Marker({
                    position: poi.pos,
                    map: map,
                    title: poi.name,
                    label: {
                        content: poi.icon,
                        offset: new AMap.Pixel(0, -22),
                        fontSize: 18
                    },
                    zIndex: 80,
                });
                // 点击弹出信息窗
                marker.on('click', () => {
                    new AMap.InfoWindow({
                        content: `<div style="padding:6px 10px; font-weight:bold; font-size:14px;">${poi.name}</div>`,
                        offset: new AMap.Pixel(0, -35),
                    }).open(map, poi.pos);
                });
            });

            // ==================== 插件初始化（仅步行、搜索、定位） ====================
            const placeSearch = new AMap.PlaceSearch({
                pageSize: 10,
                city: '龙岩',
                citylimit: true,
                bounds: new AMap.Bounds([minLng - 0.01, minLat - 0.01], [maxLng + 0.01, maxLat + 0.01])
            });

            const geolocation = new AMap.Geolocation({
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0,
                convert: true,
                showButton: true,
                buttonPosition: 'RB',
                buttonOffset: new AMap.Pixel(10, 100),
                showMarker: true,
                showCircle: true,
                panToLocation: true,
            });
            map.addControl(geolocation);

            // 仅保留步行规划器
            const walking = new AMap.Walking({ map, hideMarkers: true });

            // ==================== 全局状态 ====================
            let startPoint = null,
                endPoint = null,
                startMarker = null,
                endMarker = null;
            let searchMarkers = [];

            // DOM 引用
            const $ = id => document.getElementById(id);
            const searchInput = $('search-input');
            const searchBtn = $('search-btn');
            const startInput = $('start-input');
            const endInput = $('end-input');
            const navBtn = $('nav-btn');
            const clearBtn = $('clear-btn');
            const locateBtn = $('locate-btn');
            const resetBtn = $('reset-btn');
            const locationInfo = $('location-info');
            const resultsDiv = $('search-results');
            const resultsList = $('results-list');

            // ---------- 辅助函数 ----------
            function clearSearchMarkers() {
                searchMarkers.forEach(m => map.remove(m));
                searchMarkers = [];
            }

            function clearRoute() {
                walking.clear();
            }

            function setStart(lnglat, name) {
                if (startMarker) map.remove(startMarker);
                startPoint = lnglat;
                startMarker = new AMap.Marker({
                    position: lnglat,
                    map,
                    zIndex: 110,
                    icon: new AMap.Icon({
                        size: [28, 38],
                        image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
                        imageSize: [28, 38]
                    })
                });
                startInput.value = name || `起点 (${lnglat.lng.toFixed(4)},${lnglat.lat.toFixed(4)})`;
            }

            function setEnd(lnglat, name) {
                if (endMarker) map.remove(endMarker);
                endPoint = lnglat;
                endMarker = new AMap.Marker({
                    position: lnglat,
                    map,
                    zIndex: 110,
                    icon: new AMap.Icon({
                        size: [28, 38],
                        image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',
                        imageSize: [28, 38]
                    })
                });
                endInput.value = name || `终点 (${lnglat.lng.toFixed(4)},${lnglat.lat.toFixed(4)})`;
            }

            function clearAll() {
                clearRoute();
                clearSearchMarkers();
                if (startMarker) { map.remove(startMarker);
                    startMarker = null; }
                if (endMarker) { map.remove(endMarker);
                    endMarker = null; }
                startPoint = null;
                endPoint = null;
                startInput.value = '';
                endInput.value = '';
                resultsDiv.style.display = 'none';
            }

            function showInfo(text, dur = 3000) {
                locationInfo.innerHTML = text;
                locationInfo.style.display = 'block';
                clearTimeout(locationInfo._timer);
                locationInfo._timer = setTimeout(() => { locationInfo.style.display = 'none'; }, dur);
            }

            // ---------- 搜索功能 ----------
            searchBtn.addEventListener('click', () => {
                const kw = searchInput.value.trim();
                if (!kw) return;
                const keyword = kw.includes('龙岩学院') ? kw : '龙岩学院' + kw;
                placeSearch.search(keyword, (status, res) => {
                    if (status === 'complete' && res.info === 'OK' && res.poiList.pois.length) {
                        resultsList.innerHTML = res.poiList.pois.map((p, i) => `
                            <div class="result-item" data-index="${i}">
                                <div class="result-name">${p.name}</div>
                                <div class="result-address">${p.address || '龙岩学院内'}</div>
                                <div class="result-actions">
                                    <button class="set-start-btn" data-index="${i}">📍 设为起点</button>
                                    <button class="set-end-btn" data-index="${i}">🏁 设为终点</button>
                                </div>
                            </div>`).join('');
                        resultsDiv.style.display = 'block';

                        // 绑定结果项事件
                        document.querySelectorAll('.result-item').forEach(el => {
                            const idx = parseInt(el.getAttribute('data-index'));
                            const poi = res.poiList.pois[idx];
                            el.querySelector('.set-start-btn').onclick = (e) => {
                                e.stopPropagation();
                                setStart(poi.location, poi.name);
                            };
                            el.querySelector('.set-end-btn').onclick = (e) => {
                                e.stopPropagation();
                                setEnd(poi.location, poi.name);
                            };
                            el.onclick = () => {
                                map.setCenter(poi.location);
                                map.setZoom(18);
                            };
                        });
                    } else {
                        resultsList.innerHTML =
                            '<div style="padding:20px;text-align:center;color:#888;">未找到相关地点</div>';
                        resultsDiv.style.display = 'block';
                    }
                });
            });

            // 快捷标签
            document.querySelectorAll('.quick-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    const keyword = this.getAttribute('data-keyword');
                    searchInput.value = keyword;
                    searchBtn.click();
                });
            });

            // ---------- 地图点击选点 ----------
            map.on('click', function(e) {
                if (e.target && e.target !== map) return;
                if (!startPoint) {
                    setStart(e.lnglat, '地图选点起点');
                    showInfo('✅ 起点已设置，请点击地图选择终点');
                } else if (!endPoint) {
                    setEnd(e.lnglat, '地图选点终点');
                    showInfo('✅ 终点已设置，点击导航按钮开始步行');
                } else {
                    showInfo('起终点已就绪，可开始导航或清除重新选择');
                }
            });

            // ---------- 定位 ----------
            locateBtn.addEventListener('click', () => {
                showInfo('🔄 正在获取您的位置...');
                geolocation.getCurrentPosition((status, result) => {
                    if (status === 'complete') {
                        setStart(result.position, '我的位置');
                        showInfo('✅ 定位成功，已设为起点');
                        map.setCenter(result.position);
                        map.setZoom(17);
                    } else {
                        showInfo('❌ 定位失败，请检查浏览器定位权限或网络');
                    }
                });
            });

            // ---------- 步行导航 ----------
            navBtn.addEventListener('click', () => {
                if (!startPoint || !endPoint) {
                    alert('请先设置起点和终点');
                    return;
                }
                clearRoute();
                walking.search(startPoint, endPoint, (status, result) => {
                    if (status === 'complete' && result.routes && result.routes.length > 0) {
                        const route = result.routes[0];
                        const dist = (route.distance / 1000).toFixed(2);
                        const time = Math.round(route.time / 60);
                        showInfo(`🚶 步行路线规划成功！距离约 ${dist} 公里，预计 ${time} 分钟`);
                    } else {
                        alert('步行路线规划失败，请调整起终点位置');
                    }
                });
            });

            // ---------- 清除与重置 ----------
            clearBtn.addEventListener('click', () => {
                clearAll();
                showInfo('已清除所有标记和路线');
            });

            resetBtn.addEventListener('click', () => {
                map.setCenter(CENTER);
                map.setZoom(16);
                clearAll();
                showInfo('视图已重置');
            });

            // 点击外部关闭搜索结果
            document.addEventListener('click', function(e) {
                if (!e.target.closest('#search-results') && !e.target.closest('.search-box') && !e
                    .target.closest('.quick-tag')) {
                    resultsDiv.style.display = 'none';
                }
            });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') navBtn.click();
                if (e.key === 'Escape') clearBtn.click();
            });

            // 初始提示
            setTimeout(() => {
                showInfo('👋 点击地图选择起终点，或使用搜索/快捷标签', 5000);
            }, 1200);

        })();
    </script>
</body>
</html>
