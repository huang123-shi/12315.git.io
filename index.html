<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>龙岩学院校园生活信息服务系统</title>
  <link rel="stylesheet" href="style.css" />

  <!-- 高德地图 JS API -->
  <script type="text/javascript">
    window._AMapSecurityConfig = {
      securityJsCode: "3d310fd9f722b816654e3e9e1e1896f7"
    };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=705cdf45cca072274e50d2823999e650&plugin=AMap.Geolocation,AMap.Walking"></script>
</head>
<body>
  <div class="container">
    <!-- 左侧功能面板 -->
    <div class="sidebar">
      <h1>校园生活信息服务系统</h1>
      <h2>龙岩学院校园地图</h2>

      <div class="panel">
        <label for="keyword">校园 POI 搜索</label>
        <input type="text" id="keyword" placeholder="请输入关键词，如：图书馆、食堂、宿舍" />
        <button id="searchBtn">搜索</button>
      </div>

      <div class="panel">
        <button id="locateBtn">我的位置</button>
        <button id="clearRouteBtn">清除路线</button>
      </div>

      <div class="panel">
        <h3>当前位置</h3>
        <p id="locationInfo">尚未定位</p>
      </div>

      <div class="panel">
        <h3>搜索结果</h3>
        <ul id="resultList"></ul>
      </div>

      <div class="panel tip">
        <h3>使用说明</h3>
        <p>1. 点击“我的位置”获取当前位置</p>
        <p>2. 输入关键词搜索校园内地点</p>
        <p>3. 点击搜索结果可在地图上查看并规划步行路线</p>
      </div>
    </div>

    <!-- 右侧地图区域 -->
    <div id="map"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
